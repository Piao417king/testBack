<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>时间戳 ↔ 时间 转换</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f14;
      --card: #18181f;
      --border: #2a2a35;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #22d3ee;
      --accent-dim: #0891b2;
      --success: #34d399;
      --input-bg: #27272a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .now-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    .now-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .now-stamp {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--success);
      margin-top: 0.75rem;
    }

    .now-stamp span {
      color: var(--muted);
      font-weight: 400;
    }

    input, button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="datetime-local"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      margin-bottom: 0.75rem;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.15);
    }

    input::placeholder {
      color: var(--muted);
    }

    button {
      padding: 0.6rem 1.2rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: var(--accent-dim);
    }

    .result {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      color: var(--success);
      margin-top: 0.75rem;
      word-break: break-all;
    }

    .result-label {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    .card-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .card-title-row .card-title {
      margin-bottom: 0;
    }

    .btn-add {
      width: 32px;
      height: 32px;
      padding: 0;
      border-radius: 50%;
      font-size: 1.2rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #stampRows {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      row-gap: 0.75rem;
      column-gap: 0.5rem;
      align-items: center;
    }

    .stamp-row {
      display: contents;
    }

    .stamp-row .stamp-col-input input {
      width: 100%;
      margin-bottom: 0;
    }

    .stamp-row .stamp-result {
      min-width: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--success);
      padding: 0.75rem 1rem;
      background: var(--input-bg);
      border-radius: 8px;
      border: 1px solid var(--border);
      min-height: 2.75rem;
      min-width: 14rem;
      display: flex;
      align-items: center;
    }

    .stamp-row .stamp-result.empty {
      color: var(--muted);
    }

    .stamp-row .stamp-result.error {
      color: #f87171;
    }

    .stamp-row .stamp-col-remove {
      width: 32px;
      min-width: 32px;
      justify-self: center;
    }

    .stamp-row .btn-remove {
      width: 32px;
      height: 32px;
      padding: 0;
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: 1.1rem;
      cursor: pointer;
    }

    .stamp-row .btn-remove:hover {
      color: #f87171;
      border-color: #f87171;
    }

    .time-to-stamp-options {
      display: flex;
      gap: 1.25rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .radio-wrap {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--text);
    }

    .radio-wrap input {
      margin: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>时间戳 ↔ 时间</h1>
    <p class="subtitle">秒级 / 毫秒级时间戳与日期时间互转</p>

    <!-- 当前时间 -->
    <section class="card">
      <div class="card-title">当前时间</div>
      <div class="now-time" id="nowTime">--:--:--</div>
      <div class="now-date" id="nowDate">----/--/-- 周-</div>
      <div class="now-stamp" id="nowStamp">
        <span>时间戳（秒）</span> <span id="nowSec">0</span> &nbsp;
        <span>时间戳（毫秒）</span> <span id="nowMs">0</span>
      </div>
    </section>

    <!-- 时间戳 → 时间 -->
    <section class="card">
      <div class="card-title-row">
        <div class="card-title">时间戳 → 时间</div>
        <button type="button" class="btn-add" id="stampAddRowBtn" title="增加一行">➕</button>
      </div>
      <p class="hint" style="margin-bottom: 0.75rem;">支持 10 位（秒）或 13 位（毫秒），自动识别；负时间戳表示 1970 年之前</p>
      <div id="stampRows">
        <div class="stamp-row" data-index="0">
          <div class="stamp-col-input">
            <input type="text" class="stamp-input" placeholder="输入时间戳（秒或毫秒）">
          </div>
          <div class="stamp-result empty" data-for="0">—</div>
          <span class="stamp-col-remove"></span>
        </div>
      </div>
    </section>

    <!-- 时间 → 时间戳 -->
    <section class="card">
      <div class="card-title">时间 → 时间戳</div>
      <input type="datetime-local" id="timeInput" step="1">
      <p class="hint">选择日期和时间（含秒），并选择输出为秒或毫秒。1970 年之前的时间会得到负时间戳，属正常</p>
      <div class="time-to-stamp-options">
        <label class="radio-wrap">
          <input type="radio" name="stampUnit" value="sec" checked> 输出秒级时间戳
        </label>
        <label class="radio-wrap">
          <input type="radio" name="stampUnit" value="ms"> 输出毫秒级时间戳
        </label>
      </div>
      <button type="button" id="timeToStampBtn">转换</button>
      <div class="result-label" id="timeResultLabel"></div>
      <div class="result" id="timeResult"></div>
    </section>
  </div>

  <script>
    const weekDays = ['日', '一', '二', '三', '四', '五', '六'];

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function formatNow(d) {
      const h = pad(d.getHours());
      const m = pad(d.getMinutes());
      const s = pad(d.getSeconds());
      const y = d.getFullYear();
      const mo = pad(d.getMonth() + 1);
      const day = pad(d.getDate());
      const w = weekDays[d.getDay()];
      return {
        time: `${h}:${m}:${s}`,
        date: `${y}/${mo}/${day} 周${w}`,
        sec: Math.floor(d.getTime() / 1000),
        ms: d.getTime()
      };
    }

    function updateNow() {
      const now = formatNow(new Date());
      document.getElementById('nowTime').textContent = now.time;
      document.getElementById('nowDate').textContent = now.date;
      document.getElementById('nowSec').textContent = now.sec;
      document.getElementById('nowMs').textContent = now.ms;
    }

    updateNow();
    setInterval(updateNow, 1000);

    function stampToTime(raw) {
      raw = String(raw).trim();
      if (!raw) return { ok: false, text: '—' };
      let ms = parseInt(raw, 10);
      if (isNaN(ms)) return { ok: false, text: '无效的时间戳' };
      // 按数值判断：绝对值 < 1e12 视为秒（含负时间戳，即 1970 年之前）
      if (Math.abs(ms) < 1e12) ms = ms * 1000;
      const d = new Date(ms);
      if (isNaN(d.getTime())) return { ok: false, text: '无效的时间戳' };
      const y = d.getFullYear();
      const mo = pad(d.getMonth() + 1);
      const day = pad(d.getDate());
      const h = pad(d.getHours());
      const m = pad(d.getMinutes());
      const s = pad(d.getSeconds());
      const w = weekDays[d.getDay()];
      return { ok: true, text: `${y}-${mo}-${day} ${h}:${m}:${s} 周${w}` };
    }

    let stampRowIndex = 1;

    function convertStampRow(row) {
      const input = row.querySelector('.stamp-input');
      const resultEl = row.querySelector('.stamp-result');
      const r = stampToTime(input ? input.value : '');
      resultEl.textContent = r.text;
      resultEl.classList.remove('empty', 'error');
      if (!r.ok) resultEl.classList.add(r.text === '—' ? 'empty' : 'error');
    }

    document.getElementById('stampRows').addEventListener('input', function (e) {
      if (!e.target.classList.contains('stamp-input')) return;
      var row = e.target.closest('.stamp-row');
      if (!row) return;
      if (row._convertTimer) clearTimeout(row._convertTimer);
      row._convertTimer = setTimeout(function () {
        convertStampRow(row);
      }, 400);
    });

    document.getElementById('stampAddRowBtn').addEventListener('click', function () {
      const container = document.getElementById('stampRows');
      const idx = stampRowIndex++;
      const row = document.createElement('div');
      row.className = 'stamp-row';
      row.setAttribute('data-index', idx);
      row.innerHTML =
        '<div class="stamp-col-input">' +
          '<input type="text" class="stamp-input" placeholder="输入时间戳（秒或毫秒）">' +
        '</div>' +
        '<div class="stamp-result empty" data-for="' + idx + '">—</div>' +
        '<span class="stamp-col-remove"><button type="button" class="btn-remove" title="删除这一行">×</button></span>';
      container.appendChild(row);
      row.querySelector('.btn-remove').addEventListener('click', function () {
        row.remove();
      });
    });

    // 时间 → 时间戳
    document.getElementById('timeToStampBtn').addEventListener('click', function () {
      const raw = document.getElementById('timeInput').value;
      const label = document.getElementById('timeResultLabel');
      const result = document.getElementById('timeResult');
      const unit = document.querySelector('input[name="stampUnit"]:checked').value;
      label.textContent = '';
      result.textContent = '';

      if (!raw) {
        result.textContent = '请选择日期时间';
        result.style.color = '#f87171';
        return;
      }

      const d = new Date(raw);
      if (isNaN(d.getTime())) {
        result.textContent = '无效的日期时间';
        result.style.color = '#f87171';
        return;
      }

      const sec = Math.floor(d.getTime() / 1000);
      const ms = d.getTime();

      label.textContent = '转换结果：';
      result.textContent = unit === 'sec' ? String(sec) : String(ms);
      result.style.whiteSpace = 'pre-line';
      result.style.color = 'var(--success)';
    });

    // 初始化 datetime-local 为当前时间（含秒，格式 YYYY-MM-DDTHH:mm:ss）
    function setDefaultTime() {
      const d = new Date();
      const offset = d.getTimezoneOffset() * 60000;
      const local = new Date(d.getTime() - offset);
      const str = local.toISOString().slice(0, 19);
      document.getElementById('timeInput').value = str;
    }
    setDefaultTime();
  </script>
</body>
</html>
